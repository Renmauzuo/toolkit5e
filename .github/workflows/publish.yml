name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      - name: Set version (base)
        run: npm version ${{ github.ref_name }} --no-git-tag-version
        working-directory: packages/base

      - name: Set version (monster-scaler)
        run: npm version ${{ github.ref_name }} --no-git-tag-version
        working-directory: packages/monster-scaler

      - name: Set version (statblock)
        run: npm version ${{ github.ref_name }} --no-git-tag-version
        working-directory: packages/statblock

      - run: npm publish --provenance --access public
        working-directory: packages/base

      - run: npm publish --provenance --access public
        working-directory: packages/monster-scaler

      - run: npm publish --provenance --access public
        working-directory: packages/statblock
