name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run build

      - name: Set version from release tag
        run: npm version ${{ github.ref_name }} --no-git-tag-version --workspaces

      - run: npm publish
        working-directory: packages/base
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm publish
        working-directory: packages/monster-scaler
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm publish
        working-directory: packages/statblock
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
